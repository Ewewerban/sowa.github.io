<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sowa Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            /* TŁO Z ASSETSÓW */
            background-image: url('assets/background.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .grid {
            display: flex;
            gap: 30px;
            backdrop-filter: blur(5px);
            padding: 40px;
            border-radius: 30px;
        }

        .card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            width: 180px;
            height: 180px;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* STYL DLA IKONEK Z ASSETSÓW */
        .icon-img {
            width: 64px;
            height: 64px;
            margin-bottom: 15px;
            object-fit: contain;
        }

        .name {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="grid">
        <a href="#" id="homarr-link" class="card">
            <img src="assets/homarr.jpg" alt="Homarr" class="icon-img">
            <span class="name">HOMARR</span>
        </a>

        <a href="#" id="nextcloud-link" class="card">
            <img src="assets/nextcloud.png" alt="Nextcloud" class="icon-img">
            <span class="name">NEXTCLOUD</span>
        </a>
    </div>

    <script>
        const host = window.location.hostname;
        document.getElementById('homarr-link').href = `http://${host}:7575`;
        document.getElementById('nextcloud-link').href = `http://${host}:8080`;
    </script>

</body>
</html>
